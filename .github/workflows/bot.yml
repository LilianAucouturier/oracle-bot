name: Oracle Auto Provision

on:
  schedule:
    - cron: "*/5 * * * *" # Le robot cliquera sur "Create" toutes les 5 minutes 24h/24 !
  workflow_dispatch: # Permet aussi de lancer manuellement

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Préparer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer OCI SDK
        run: pip install oci

      - name: Lancer le robot Oracle
        env:
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: python main.py
